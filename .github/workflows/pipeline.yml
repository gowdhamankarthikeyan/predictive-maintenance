name: Predictive Maintenance Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r predictive_maintenance/requirements.txt
      - name: Upload Raw Dataset to HuggingFace Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_DATASET_NAME: ${{ secrets.HF_DATASET_NAME }}
        run: python predictive_maintenance/model_building/data_register.py

  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r predictive_maintenance/requirements.txt
      - name: Run Data Preparation and Upload Splits to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_DATASET_NAME: ${{ secrets.HF_DATASET_NAME }}
        run: python predictive_maintenance/model_building/prep.py

  model-training:
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r predictive_maintenance/requirements.txt
      - name: Start MLflow Tracking Server
        run: |
          nohup mlflow ui --host 0.0.0.0 --port 5000 &
          sleep 5
      - name: Train Model and Register to HuggingFace Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_DATASET_NAME: ${{ secrets.HF_DATASET_NAME }}
          HF_MODEL_NAME: ${{ secrets.HF_MODEL_NAME }}
        run: python predictive_maintenance/model_building/train.py

  deploy-hosting:
    needs: [model-training, data-prep, register-dataset]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r predictive_maintenance/requirements.txt
      - name: Push Deployment Files to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: python predictive_maintenance/hosting/hosting.py
